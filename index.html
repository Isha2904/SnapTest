<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Admin Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Admin Portal!!!!!</h1>
    <h2>Welcome Back Amigo!!!</h2>
    <p>Please use admin as username and password123 as password.</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="e.g. admin" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="password123" required>
        </div>
        <button type="submit" class="btn">Log In</button>
    </form> 
    
    <p id="error-msg">Invalid username or password.</p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === 'admin' && pass === 'password123') {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    });
</script>

</body>
</html>
