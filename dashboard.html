<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Admin Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" style="max-width: 600px;">
    <h1>Admin Dashboard</h1>
    <hr>
    <p>Hello, <strong>admin</strong>! You have successfully logged into the protected area.</p>
    
    <div style="text-align: left; margin: 20px 0; background: #f8f9fa; padding: 15px; border-left: 5px solid #007bff;">
        <p><strong>Status:</strong> Active</p>
        <p><strong>Role:</strong> Super User</p>
        <p><strong>Last Login:</strong> Just now</p>
    </div>

    <button onclick="logout()" class="btn btn-logout">Logout</button>
</div>

<script>
    function logout() {
        // In a real app, you would clear session tokens here
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
